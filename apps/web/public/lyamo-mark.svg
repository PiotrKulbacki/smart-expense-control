<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Lyamo">
  <title>Lyamo</title>
  <defs>
    <linearGradient id="mark-cool" x1="16" y1="6" x2="36" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5eeadb"/>
      <stop offset="1" stop-color="#3dd6c3"/>
    </linearGradient>
    <linearGradient id="mark-warm" x1="10" y1="40" x2="54" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f0c060"/>
      <stop offset="1" stop-color="#e8a849"/>
    </linearGradient>
  </defs>

  <!-- Vertical stem (warm) -->
  <rect x="12" y="6" width="18" height="52" rx="9" fill="url(#mark-warm)" opacity="0.92"/>
  <!-- Horizontal base (cool) -->
  <rect x="12" y="40" width="40" height="18" rx="9" fill="url(#mark-cool)" opacity="0.78"/>
</svg>
